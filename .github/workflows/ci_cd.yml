name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: weather_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests \
            psycopg2-binary \
            python-dotenv \
            pytest \
            pytest-cov

      - name: Set up database schemas and tables
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PGUSER: ${{ secrets.POSTGRES_USER }}
        run: |
          psql -h localhost -U $PGUSER -d weather_db -f scripts/init_database.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/bronze/ddl_bronze_hourly.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/bronze/ddl_bronze_daily.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/silver/ddl_silver_dim_cities.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/silver/ddl_silver_weather_hourly.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/silver/ddl_silver_weather_daily.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/gold/ddl_gold_daily_summary.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/gold/ddl_gold_province_summary.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/gold/ddl_gold_hottest_cities.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/gold/ddl_gold_rainiest_cities.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/gold/ddl_gold_weekly_trends.sql
          psql -h localhost -U $PGUSER -d weather_db -f scripts/gold/ddl_gold_city_comparison.sql

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run integration structure tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weather_db
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          pytest tests/integration/ -v --tb=short -k "schema or table_exists"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short --cov=dags --cov-report=term-missing